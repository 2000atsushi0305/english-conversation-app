<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boba キャラクター候補</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      min-height: 100vh;
    }
    h1 { color: #444; margin-bottom: 8px; font-size: 1.3rem; }
    p  { color: #888; font-size: 0.85rem; margin-bottom: 36px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 560px;
      width: 100%;
    }
    @media (min-width: 560px) {
      .grid { grid-template-columns: repeat(3, 1fr); max-width: 720px; }
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 30px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 24px rgba(102,126,234,0.12);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(102,126,234,0.22); }
    .card svg { width: 120px; height: 120px; }
    .card-name { font-size: 0.95rem; font-weight: 700; color: #333; }
    .card-desc { font-size: 0.78rem; color: #888; text-align: center; line-height: 1.6; }
    .current-badge {
      font-size: 0.65rem;
      background: #ddd;
      color: #888;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>🟣 Boba 目・口 バリエーション</h1>
  <p>目と口のデザインを変えた候補です。どれが好みですか？</p>

  <div class="grid">

    <!-- 現在 (Before) -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <!-- 耳 -->
        <circle cx="19" cy="19" r="11" fill="url(#g0)"/>
        <circle cx="45" cy="19" r="11" fill="url(#g0)"/>
        <!-- 顔 -->
        <circle cx="32" cy="40" r="23" fill="url(#g0)"/>
        <!-- 目 -->
        <circle cx="24" cy="37" r="5" fill="white"/>
        <circle cx="40" cy="37" r="5" fill="white"/>
        <circle cx="25" cy="38" r="2.8" fill="#2a2050"/>
        <circle cx="41" cy="38" r="2.8" fill="#2a2050"/>
        <circle cx="26.2" cy="36.5" r="1.1" fill="white"/>
        <circle cx="42.2" cy="36.5" r="1.1" fill="white"/>
        <!-- 口 -->
        <path d="M 24 46 Q 32 53 40 46" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="card-name">現在のBoba</div>
      <span class="current-badge">現行</span>
      <div class="card-desc">シンプルな現行デザイン</div>
    </div>

    <!-- A: キラキラ目 + 大きな笑顔 -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="11" fill="url(#gA)"/>
        <circle cx="45" cy="19" r="11" fill="url(#gA)"/>
        <circle cx="32" cy="40" r="23" fill="url(#gA)"/>
        <!-- 大きめの目 -->
        <circle cx="24" cy="37" r="6" fill="white"/>
        <circle cx="40" cy="37" r="6" fill="white"/>
        <!-- 虹彩（グラデーション） -->
        <circle cx="24" cy="37.5" r="3.8" fill="#4c1d95"/>
        <circle cx="40" cy="37.5" r="3.8" fill="#4c1d95"/>
        <circle cx="24" cy="37.5" r="2" fill="#7c3aed"/>
        <circle cx="40" cy="37.5" r="2" fill="#7c3aed"/>
        <!-- ハイライト（大） -->
        <circle cx="22.5" cy="35.5" r="1.8" fill="white" opacity="0.95"/>
        <circle cx="38.5" cy="35.5" r="1.8" fill="white" opacity="0.95"/>
        <!-- 小ハイライト -->
        <circle cx="26" cy="39" r="0.8" fill="white" opacity="0.5"/>
        <circle cx="42" cy="39" r="0.8" fill="white" opacity="0.5"/>
        <!-- 大きな笑顔 -->
        <path d="M 22 46 Q 32 55 42 46" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="card-name">A: キラキラ目</div>
      <div class="card-desc">大きな瞳にグラデーション虹彩<br>ハイライト強め・大きな笑顔</div>
    </div>

    <!-- B: 半月目（ウインク風）+ 小さな口 -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="11" fill="url(#gB)"/>
        <circle cx="45" cy="19" r="11" fill="url(#gB)"/>
        <circle cx="32" cy="40" r="23" fill="url(#gB)"/>
        <!-- 半月目（まつげ付き） -->
        <!-- 左目：弧 -->
        <path d="M 19 38 Q 24 33 29 38" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- 右目：弧 -->
        <path d="M 35 38 Q 40 33 45 38" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- まつげ（左） -->
        <line x1="20" y1="37.5" x2="19" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="24" y1="34.5" x2="24" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="37.5" x2="29" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <!-- まつげ（右） -->
        <line x1="36" y1="37.5" x2="35" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="40" y1="34.5" x2="40" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="44" y1="37.5" x2="45" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <!-- 小さめの口 -->
        <path d="M 27 47 Q 32 52 37 47" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="card-name">B: 半月目</div>
      <div class="card-desc">にっこり細目＋まつげ<br>おしゃれで穏やかな表情</div>
    </div>

    <!-- C: ☆スター目 + 開いた口 -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="11" fill="url(#gC)"/>
        <circle cx="45" cy="19" r="11" fill="url(#gC)"/>
        <circle cx="32" cy="40" r="23" fill="url(#gC)"/>
        <!-- 星目（左） -->
        <polygon points="24,31 25.2,34.8 29,34.8 26,37.2 27.2,41 24,38.6 20.8,41 22,37.2 19,34.8 22.8,34.8" fill="white" opacity="0.95"/>
        <!-- 星目（右） -->
        <polygon points="40,31 41.2,34.8 45,34.8 42,37.2 43.2,41 40,38.6 36.8,41 38,37.2 35,34.8 38.8,34.8" fill="white" opacity="0.95"/>
        <!-- 開いた笑い口 -->
        <path d="M 24 46 Q 32 55 40 46" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <path d="M 25 46.5 Q 32 52 39 46.5" fill="rgba(255,255,255,0.25)" stroke="none"/>
      </svg>
      <div class="card-name">C: スター目</div>
      <div class="card-desc">キラキラ星目<br>楽しさ・元気さを表現</div>
    </div>

    <!-- D: ドット目（シンプル）+ にっこり -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gD" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="11" fill="url(#gD)"/>
        <circle cx="45" cy="19" r="11" fill="url(#gD)"/>
        <circle cx="32" cy="40" r="23" fill="url(#gD)"/>
        <!-- 丸ドット目（太い） -->
        <circle cx="24" cy="37" r="4.5" fill="white"/>
        <circle cx="40" cy="37" r="4.5" fill="white"/>
        <circle cx="24" cy="37" r="3" fill="#2a2050"/>
        <circle cx="40" cy="37" r="3" fill="#2a2050"/>
        <!-- 白目ハイライト（2か所） -->
        <circle cx="22.5" cy="35.5" r="1.2" fill="white"/>
        <circle cx="38.5" cy="35.5" r="1.2" fill="white"/>
        <circle cx="25.5" cy="38.5" r="0.6" fill="white" opacity="0.6"/>
        <circle cx="41.5" cy="38.5" r="0.6" fill="white" opacity="0.6"/>
        <!-- にっこり（太め） -->
        <path d="M 25 47 Q 32 53 39 47" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="card-name">D: ぱっちり目</div>
      <div class="card-desc">シンプルな丸目に<br>ハイライト2つで深み</div>
    </div>

    <!-- E: ウィンク + 余裕の口 -->
    <div class="card">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gE" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
        <circle cx="19" cy="19" r="11" fill="url(#gE)"/>
        <circle cx="45" cy="19" r="11" fill="url(#gE)"/>
        <circle cx="32" cy="40" r="23" fill="url(#gE)"/>
        <!-- 左目：通常 -->
        <circle cx="24" cy="37" r="5" fill="white"/>
        <circle cx="24.5" cy="37.5" r="3" fill="#2a2050"/>
        <circle cx="22.8" cy="35.8" r="1.3" fill="white"/>
        <!-- 右目：ウィンク（線） -->
        <path d="M 36 37 Q 40 34 44 37" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- ウィンクのまつげ -->
        <line x1="37" y1="36.5" x2="36.5" y2="33.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="40" y1="35" x2="40" y2="32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="43" y1="36.5" x2="43.5" y2="33.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <!-- 余裕の口（少し傾いた） -->
        <path d="M 25 47 Q 31 53 38 46" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="card-name">E: ウィンク</div>
      <div class="card-desc">片目ウィンクでチャーミング<br>ちょっとユニークな表情</div>
    </div>

  </div>
</body>
</html>
