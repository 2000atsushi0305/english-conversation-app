<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="matchaBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8C887"/>
      <stop offset="100%" stop-color="#6B8E5A"/>
    </linearGradient>
  </defs>
  <!-- leaf ears -->
  <ellipse cx="18" cy="18" rx="9" ry="11" fill="url(#matchaBody)" transform="rotate(-18 18 18)"/>
  <ellipse cx="46" cy="18" rx="9" ry="11" fill="url(#matchaBody)" transform="rotate(18 46 18)"/>
  <ellipse cx="18" cy="20" rx="4" ry="6" fill="#C5DDA8" transform="rotate(-18 18 20)"/>
  <ellipse cx="46" cy="20" rx="4" ry="6" fill="#C5DDA8" transform="rotate(18 46 20)"/>
  <!-- body -->
  <circle cx="32" cy="40" r="22" fill="url(#matchaBody)"/>
  <!-- cheeks -->
  <ellipse cx="18" cy="44" rx="5" ry="3.5" fill="#E8B4A0" opacity="0.85"/>
  <ellipse cx="46" cy="44" rx="5" ry="3.5" fill="#E8B4A0" opacity="0.85"/>
  <!-- glasses -->
  <circle cx="25.5" cy="36.5" r="6" stroke="#3D2E1F" stroke-width="1.6" fill="none"/>
  <circle cx="38.5" cy="36.5" r="6" stroke="#3D2E1F" stroke-width="1.6" fill="none"/>
  <line x1="31.5" y1="36.5" x2="32.5" y2="36.5" stroke="#3D2E1F" stroke-width="1.6"/>
  <!-- eyes (inside glasses) -->
  <path d="M 22.5 37 Q 25.5 39 28.5 37" stroke="#3D2E1F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 35.5 37 Q 38.5 39 41.5 37" stroke="#3D2E1F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- smile -->
  <path d="M 28 47 Q 32 50 36 47" stroke="#3D2E1F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- matcha powder sprinkles on top -->
  <circle cx="24" cy="10" r="1.5" fill="#4A6740"/>
  <circle cx="29" cy="7" r="1.3" fill="#4A6740"/>
  <circle cx="35" cy="7" r="1.5" fill="#4A6740"/>
  <circle cx="40" cy="10" r="1.3" fill="#4A6740"/>
  <circle cx="32" cy="5" r="1.4" fill="#4A6740"/>
</svg>
