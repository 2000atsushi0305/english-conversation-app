<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coffeeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5C3A22"/>
      <stop offset="100%" stop-color="#2A1A0A"/>
    </linearGradient>
  </defs>
  <!-- leaf ears (will be covered by headphones partially) -->
  <ellipse cx="18" cy="20" rx="9" ry="11" fill="url(#coffeeBody)" transform="rotate(-18 18 20)"/>
  <ellipse cx="46" cy="20" rx="9" ry="11" fill="url(#coffeeBody)" transform="rotate(18 46 20)"/>
  <!-- body -->
  <circle cx="32" cy="40" r="22" fill="url(#coffeeBody)"/>
  <!-- cheeks (subtle) -->
  <ellipse cx="18" cy="44" rx="5" ry="3.5" fill="#E8B4A0" opacity="0.6"/>
  <ellipse cx="46" cy="44" rx="5" ry="3.5" fill="#E8B4A0" opacity="0.6"/>
  <!-- eyes behind glasses (small dots, cooler) -->
  <circle cx="25.5" cy="36.5" r="1.8" fill="#fff"/>
  <circle cx="38.5" cy="36.5" r="1.8" fill="#fff"/>
  <circle cx="25.5" cy="36.5" r="0.9" fill="#3D2E1F"/>
  <circle cx="38.5" cy="36.5" r="0.9" fill="#3D2E1F"/>
  <!-- subtle smirk -->
  <path d="M 29 48 Q 32 49.5 35 48" stroke="#3D2E1F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- square-frame glasses -->
  <rect x="20" y="32.5" width="11" height="8" rx="1" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
  <rect x="33" y="32.5" width="11" height="8" rx="1" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
  <line x1="31" y1="36.5" x2="33" y2="36.5" stroke="#1A1A1A" stroke-width="1.6"/>
  <!-- large headphones -->
  <!-- band -->
  <path d="M 12 22 Q 32 4 52 22" stroke="#1A1A1A" stroke-width="2.6" fill="none"/>
  <!-- left earcup -->
  <ellipse cx="11" cy="28" rx="5" ry="7" fill="#1A1A1A"/>
  <ellipse cx="11" cy="28" rx="3" ry="4.5" fill="#3A3A3A"/>
  <!-- right earcup -->
  <ellipse cx="53" cy="28" rx="5" ry="7" fill="#1A1A1A"/>
  <ellipse cx="53" cy="28" rx="3" ry="4.5" fill="#3A3A3A"/>
</svg>
