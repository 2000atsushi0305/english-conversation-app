<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sakuraBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBE2EA"/>
      <stop offset="100%" stop-color="#E8A0B8"/>
    </linearGradient>
  </defs>
  <!-- leaf ears -->
  <ellipse cx="18" cy="22" rx="9" ry="11" fill="url(#sakuraBody)" transform="rotate(-18 18 22)"/>
  <ellipse cx="46" cy="22" rx="9" ry="11" fill="url(#sakuraBody)" transform="rotate(18 46 22)"/>
  <ellipse cx="18" cy="24" rx="4" ry="6" fill="#FFEDF3" transform="rotate(-18 18 24)"/>
  <ellipse cx="46" cy="24" rx="4" ry="6" fill="#FFEDF3" transform="rotate(18 46 24)"/>
  <!-- body -->
  <circle cx="32" cy="40" r="22" fill="url(#sakuraBody)"/>
  <!-- cheeks -->
  <ellipse cx="18" cy="44" rx="5" ry="3.5" fill="#F687A8" opacity="0.85"/>
  <ellipse cx="46" cy="44" rx="5" ry="3.5" fill="#F687A8" opacity="0.85"/>
  <!-- sakura petal on right cheek -->
  <path d="M 44 47 Q 46 45 48 47 Q 46 49 44 47 Z" fill="#F687A8" opacity="0.7"/>
  <!-- eyes (gentle curves) -->
  <path d="M 22 36 Q 25.5 39 29 36" stroke="#3D2E1F" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M 35 36 Q 38.5 39 42 36" stroke="#3D2E1F" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- soft smile -->
  <path d="M 28 47 Q 32 50 36 47" stroke="#3D2E1F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- straw hat -->
  <!-- brim -->
  <ellipse cx="32" cy="15" rx="22" ry="4" fill="#D4A256"/>
  <ellipse cx="32" cy="15" rx="22" ry="3" fill="#C9924A"/>
  <!-- crown -->
  <ellipse cx="32" cy="11" rx="10" ry="5" fill="#D4A256"/>
  <!-- hat band -->
  <ellipse cx="32" cy="14" rx="10" ry="1.4" fill="#A87436"/>
  <!-- sakura flower on hat -->
  <g transform="translate(42 10)">
    <circle cx="0" cy="-2" r="1.6" fill="#FB95BA"/>
    <circle cx="-2" cy="-1" r="1.6" fill="#FB95BA"/>
    <circle cx="2" cy="-1" r="1.6" fill="#FB95BA"/>
    <circle cx="-1.2" cy="1.6" r="1.6" fill="#FB95BA"/>
    <circle cx="1.2" cy="1.6" r="1.6" fill="#FB95BA"/>
    <circle cx="0" cy="0" r="0.9" fill="#FBE085"/>
  </g>
</svg>
