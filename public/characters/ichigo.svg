<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ichigoBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBD2DC"/>
      <stop offset="100%" stop-color="#E88AA6"/>
    </linearGradient>
  </defs>
  <!-- leaf ears -->
  <ellipse cx="18" cy="22" rx="9" ry="11" fill="url(#ichigoBody)" transform="rotate(-18 18 22)"/>
  <ellipse cx="46" cy="22" rx="9" ry="11" fill="url(#ichigoBody)" transform="rotate(18 46 22)"/>
  <ellipse cx="18" cy="24" rx="4" ry="6" fill="#FFEDF3" transform="rotate(-18 18 24)"/>
  <ellipse cx="46" cy="24" rx="4" ry="6" fill="#FFEDF3" transform="rotate(18 46 24)"/>
  <!-- body -->
  <circle cx="32" cy="40" r="22" fill="url(#ichigoBody)"/>
  <!-- 2 tiny strawberry seeds on body (subtle decoration) -->
  <ellipse cx="22" cy="44" rx="0.8" ry="1.2" fill="#FBE085" opacity="0.7"/>
  <ellipse cx="42" cy="44" rx="0.8" ry="1.2" fill="#FBE085" opacity="0.7"/>
  <!-- cheeks (sweeter pink) -->
  <ellipse cx="18" cy="44" rx="5" ry="3.5" fill="#FF8FAE" opacity="0.85"/>
  <ellipse cx="46" cy="44" rx="5" ry="3.5" fill="#FF8FAE" opacity="0.85"/>
  <!-- gentle eyes (same style as milk) -->
  <path d="M 22 36 Q 25.5 39 29 36" stroke="#3D2E1F" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M 35 36 Q 38.5 39 42 36" stroke="#3D2E1F" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- soft smile -->
  <path d="M 28 47 Q 32 50 36 47" stroke="#3D2E1F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- strawberry stem on top: clean 3-leaf calyx + small stem -->
  <g transform="translate(32 8)">
    <!-- center leaf -->
    <path d="M 0 -4 Q -2 0 0 4 Q 2 0 0 -4 Z" fill="#6FA85A"/>
    <!-- left leaf -->
    <path d="M -5 -1 Q -7 2 -3 4 Q -1 1 -5 -1 Z" fill="#7AB868"/>
    <!-- right leaf -->
    <path d="M 5 -1 Q 7 2 3 4 Q 1 1 5 -1 Z" fill="#7AB868"/>
    <!-- tiny stem -->
    <rect x="-0.6" y="-5" width="1.2" height="2" fill="#5A8C42"/>
  </g>
</svg>
